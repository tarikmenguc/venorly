name: Deploy to OVH VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "📦 Güncel kodu çekiyorum..."
            cd /home/ubuntu/venor-ai
            git pull origin main

            echo "🔨 İmajı build ediyorum (eski container çalışırken)..."
            docker compose build api scheduler

            echo "🔄 Container'ları güncelliyorum..."
            docker compose up -d api scheduler

            echo "🔗 API'nin Caddy ağına bağlı olduğunu doğruluyorum..."
            docker network connect chat-bot_default venor-ai-api-1 2>/dev/null || true

            echo "🧹 Eski image'ları temizliyorum..."
            docker image prune -f

            echo "🏥 Sağlık kontrolü (8s bekleniyor)..."
            sleep 8
            docker compose exec -T api python3 -c "
import http.client, sys
try:
    c = http.client.HTTPConnection('localhost', 8000, timeout=5)
    c.request('GET', '/docs')
    r = c.getresponse()
    sys.exit(0 if r.status < 500 else 1)
except Exception as e:
    print(f'Bağlantı hatası: {e}'); sys.exit(1)
" || (echo "❌ Health check başarısız!" && exit 1)

            echo "✅ Deploy başarılı!"
            docker compose ps
