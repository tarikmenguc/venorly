# ============================================================
# Venor AI — Docker Compose
#
# Kullanım:
#   cp .env.example .env
#   docker compose up --build -d api scheduler
# ============================================================

services:
  # ---- Backend (FastAPI) ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # Port binding yok — Caddy, chat-bot_default network üzerinden
    # container adıyla (venor-ai-api-1:8000) doğrudan ulaşır
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import http.client,sys; c=http.client.HTTPConnection('localhost',8000,timeout=5); c.request('GET','/docs'); r=c.getresponse(); sys.exit(0 if r.status<500 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - default
      - caddy_network

  # ---- Scheduler (daily pipeline + alerts) ----
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scheduler.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - default

  # ---- Frontend (Next.js) — Vercel'de çalışıyor, burada kullanılmıyor ----
  # web: ...

networks:
  default:
  caddy_network:
    external: true
    name: chat-bot_default
