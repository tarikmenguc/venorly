# ============================================================
# Startup Idea Finder — Docker Compose
#
# Kullanım:
#   cp .env.example .env          # .env dosyasını oluştur
#   cp web/env.example web/.env.local
#   docker compose up --build     # Servisleri başlat
#   docker compose up -d          # Arka planda çalıştır
# ============================================================

version: '3.9'

services:
  # ---- Backend (FastAPI) ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # Persist scraper data & ChromaDB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Scheduler (daily pipeline + alerts) ----
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scheduler.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  # ---- Frontend (Next.js) ----
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: http://api:8000
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    env_file:
      - web/.env.local
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
